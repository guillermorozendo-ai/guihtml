
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .container { padding: 1rem 0; max-width: 720px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
  .tab:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .tab.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }

  /* Flashcards */
  .fc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .fc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; min-height: 100px; cursor: pointer; position: relative; transition: border-color 0.15s; }
  .fc:hover { border-color: var(--color-border-secondary); }
  .fc-q { font-size: 14px; font-weight: 500; color: var(--color-text-primary); line-height: 1.5; }
  .fc-a { font-size: 13px; color: var(--color-text-secondary); margin-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 10px; display: none; line-height: 1.6; }
  .fc.open .fc-a { display: block; }
  .fc-hint { font-size: 11px; color: var(--color-text-tertiary); position: absolute; bottom: 8px; right: 10px; }
  .fc.open .fc-hint { display: none; }

  /* V/F quiz */
  .vf-item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .vf-stmt { font-size: 14px; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 12px; }
  .vf-btns { display: flex; gap: 8px; }
  .vf-btn { padding: 6px 18px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text-secondary); }
  .vf-btn:hover { background: var(--color-background-secondary); }
  .vf-btn.correct { background: #EAF3DE; color: #27500A; border-color: #97C459; font-weight: 500; }
  .vf-btn.wrong { background: #FCEBEB; color: #791F1F; border-color: #F09595; }
  .vf-feedback { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: var(--border-radius-md); display: none; line-height: 1.5; }
  .vf-feedback.show { display: block; }
  .vf-feedback.ok { background: #EAF3DE; color: #3B6D11; }
  .vf-feedback.fail { background: #FCEBEB; color: #A32D2D; }
  .vf-score { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; }

  /* Desarrollo */
  .dev-item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 12px; }
  .dev-q { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 10px; }
  .dev-guide { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; border-left: 2px solid #AFA9EC; padding-left: 10px; margin-bottom: 10px; }
  .dev-btn { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid #AFA9EC; font-size: 13px; cursor: pointer; background: transparent; color: #3C3489; }
  .dev-btn:hover { background: #EEEDFE; }

  /* Cuadros comparativos */
  .table-wrap { overflow-x: auto; margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #EEEDFE; color: #3C3489; font-weight: 500; padding: 10px 14px; text-align: left; border: 0.5px solid #AFA9EC; }
  td { padding: 9px 14px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: top; line-height: 1.5; }
  tr:nth-child(even) td { background: var(--color-background-secondary); }

  .progress-bar { height: 4px; background: var(--color-background-secondary); border-radius: 2px; margin-bottom: 1rem; }
  .progress-fill { height: 100%; border-radius: 2px; background: #7F77DD; transition: width 0.3s; }
  .reset-btn { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text-secondary); margin-bottom: 1rem; }
  .reset-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="container">
  <div class="header">
    <h2>Herramienta de estudio — Psicología</h2>
    <p>Haz clic en cada sección para estudiar. Las tarjetas se abren al tocarlas.</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('definitions')">Definiciones</button>
    <button class="tab" onclick="switchTab('citas')">Citas y listas</button>
    <button class="tab" onclick="switchTab('vf')">Verdadero / Falso</button>
    <button class="tab" onclick="switchTab('desarrollo')">Preguntas de desarrollo</button>
    <button class="tab" onclick="switchTab('cuadros')">Cuadros comparativos</button>
  </div>

  <!-- DEFINICIONES -->
  <div id="definitions" class="section active">
    <div class="fc-grid" id="fc-grid"></div>
  </div>

  <!-- CITAS -->
  <div id="citas" class="section">
    <div class="fc-grid" id="citas-grid"></div>
  </div>

  <!-- V/F -->
  <div id="vf" class="section">
    <div style="display:flex; gap:12px; align-items:center; margin-bottom:1rem; flex-wrap:wrap;">
      <button class="reset-btn" onclick="resetVF()">Reiniciar quiz</button>
      <span class="vf-score" id="vf-score">Respondidas: 0 / 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="vf-progress" style="width:0%"></div></div>
    <div id="vf-list"></div>
  </div>

  <!-- DESARROLLO -->
  <div id="desarrollo" class="section">
    <div id="dev-list"></div>
  </div>

  <!-- CUADROS -->
  <div id="cuadros" class="section">
    <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:1rem;">Memoriza las diferencias clave entre cada par de conceptos.</p>
    <div id="cuadros-content"></div>
  </div>
</div>

<script>
const flashcards = [
  { q: "Psicología", a: "Del griego psique/psyché (alma, psique o actividad mental) + logía (estudio o tratado). Significa: estudio o tratado del alma." },
  { q: "Psicopatología", a: "Rama de la psicología que estudia los trastornos mentales, sus causas, síntomas, clasificación y tratamientos." },
  { q: "Inteligencia", a: "Capacidad cognitiva para aprender, razonar, resolver problemas, adaptarse al entorno y comprender conceptos abstractos." },
];

const citas = [
  { q: "2 tipos de la psicología", a: "1. Psicología básica\n2. Psicología aplicada" },
  { q: "2 corrientes psicológicas", a: "1. Conductismo\n2. Psicoanálisis (u otras según tus apuntes)" },
  { q: "2 tipos de mecanismos de defensa", a: "1. Mecanismos primarios (inmaduro)\n2. Mecanismos secundarios (maduro)" },
  { q: "2 tipos de temperamento y personalidad", a: "1. Introvertido\n2. Extrovertido" },
  { q: "3 funciones del hipotálamo", a: "1. Regular temperatura corporal\n2. Controlar hambre y sed\n3. Regular el sueño y el ritmo circadiano" },
  { q: "3 principales trastornos del estado de ánimo", a: "1. Depresión mayor\n2. Trastorno bipolar\n3. Distimia" },
  { q: "Métodos de evaluación de la personalidad", a: "• Entrevista clínica\n• Test proyectivos (ej. Rorschach)\n• Cuestionarios/inventarios (ej. MMPI)\n• Observación conductual" },
  { q: "4 trastornos relacionados con el hipotálamo", a: "1. Obesidad / anorexia\n2. Insomnio\n3. Hipotermia / hipertermia\n4. Trastornos hormonales (ej. diabetes insípida)" },
  { q: "Trastornos relacionados con la alteración del sudor", a: "• Hiperhidrosis (sudoración excesiva)\n• Anhidrosis (ausencia de sudor)\n• Diaforesis (sudoración profusa por causas médicas)" },
  { q: "Trastornos relacionados con el sueño", a: "• Insomnio\n• Hipersomnia\n• Narcolepsia\n• Pánico nocturno\n• Pesadillas / terrores nocturnos\n• Apnea del sueño" },
];

const vfItems = [
  { stmt: "La psicología proviene del griego psique o psyché (alma) y logía (estudio), por tanto significa estudio del alma.", answer: true, feedback: "Correcto. Esta es la etimología clásica de psicología." },
  { stmt: "Lo que comemos no solo afecta a cómo nos sentimos, sino que cómo nos sentimos también afecta a nuestra manera de comer.", answer: true, feedback: "Correcto. La relación emoción-alimentación es bidireccional." },
  { stmt: "Comer por el paladar tiene que ver con el placer y el sistema de recompensa mediado por la dopamina.", answer: true, feedback: "Correcto. El sistema dopaminérgico regula el placer asociado a la comida." },
  { stmt: "Según el DSM-5, el diagnóstico de trastorno de pánico requiere ataques recurrentes e inesperados más al menos 1 mes de preocupación persistente o cambios de comportamiento.", answer: true, feedback: "Correcto. Esos son los criterios diagnósticos del DSM-5." },
  { stmt: "Los tratamientos para la ansiedad y el pánico incluyen terapia ocupacional, dieta y técnicas de estímulo.", answer: false, feedback: "Falso. Los tratamientos correctos incluyen: terapia cognitivo-conductual (TCC), farmacoterapia (ansiolíticos/antidepresivos), técnicas de relajación, psicoeducación y exposición gradual." },
  { stmt: "Las causas del trastorno de ansiedad generalizada incluyen vulnerabilidad biológica, psicológica, estrés, aprensión y depresión.", answer: true, feedback: "Correcto. Esas son las causas descritas en el modelo biopsicosocial de la ansiedad generalizada." },
  { stmt: "Los síntomas del trastorno de ansiedad generalizada incluyen frecuencia cardíaca alterada, presión aumentada, conductividad de la piel y aumento de la región beta (EEG).", answer: true, feedback: "Correcto. Estos son los marcadores fisiológicos del estado de ansiedad." },
  { stmt: "El pánico nocturno ocurre durante el sueño profundo, con mayor frecuencia entre 1:30 y 3:30 am.", answer: true, feedback: "Correcto. El pánico nocturno es un subtipo que ocurre en fase de sueño profundo (no-REM)." },
  { stmt: "El tratamiento para fobias específicas exige ejercicios de exposición estructurada y constante, practicando primero en casa y luego extendiéndola fuera.", answer: true, feedback: "Correcto. Esto describe la técnica de exposición gradual (desensibilización sistemática)." },
  { stmt: "Los factores económicos, climáticos y el estado corporal son las causas principales de los ataques de pánico con o sin agorafobia.", answer: false, feedback: "Falso. Las causas incluyen: vulnerabilidad biológica (genética, neurobiológica), factores psicológicos (estrés, aprendizaje), historia de trauma, y en algunos modelos: abuso de sustancias. Los factores económicos o climáticos no son causas principales según el DSM." },
];

const desarrollo = [
  { q: "¿Qué es un trastorno psicológico? ¿Qué factores promueven su aparición?", guide: "Define: patrón de síntomas que causa malestar significativo y deterioro funcional. Factores: biológicos (genética, neurobiología), psicológicos (aprendizaje, cognición, trauma) y sociales/ambientales (estrés, cultura, relaciones)." },
  { q: "Trastornos de la ansiedad y sus síntomas clásicos", guide: "Incluye: TAG, fobia específica, fobia social, trastorno de pánico, TOC, TEPT. Síntomas clásicos: tensión muscular, hipervigilancia, preocupación excesiva, evitación, taquicardia, sudoración, dificultad para concentrarse." },
  { q: "Trastorno de pánico y sus síntomas clásicos", guide: "Ataques repentinos de miedo intenso. Síntomas: palpitaciones, disnea, mareo, sensación de irrealidad (despersonalización), miedo a morir o 'volverse loco', parestesias. Dura minutos y alcanza pico en ~10 min." },
  { q: "¿A qué se refiere el tratamiento cognitivo-conductual en los trastornos de ansiedad?", guide: "TCC: identifica y reestructura pensamientos irracionales + exposición graduada a situaciones temidas + técnicas de relajación. Objetivo: cambiar patrones de pensamiento y conductas de evitación." },
];

const cuadros = [
  {
    title: "Personalidad vs Carácter",
    headers: ["Aspecto", "Personalidad", "Carácter"],
    rows: [
      ["Definición", "Conjunto de rasgos psicológicos estables que determinan el modo de pensar, sentir y actuar de una persona.", "Parte de la personalidad formada por la experiencia, la educación y el ambiente social."],
      ["Origen", "Biológico + ambiental (temperamento + carácter)", "Principalmente ambiental/aprendido"],
      ["Modificable", "Parcialmente; estable a lo largo del tiempo", "Más moldeable con experiencia y educación"],
      ["Relación", "Concepto más amplio; incluye al carácter", "Componente adquirido de la personalidad"],
      ["Ejemplo", "Una persona siempre introvertida y ordenada", "Alguien que aprende a ser puntual y disciplinado"],
    ]
  },
  {
    title: "1ª Tópica vs 2ª Tópica (Freud)",
    headers: ["Aspecto", "1ª Tópica", "2ª Tópica"],
    rows: [
      ["Instancias", "Consciente, Preconsciente, Inconsciente", "Ello, Yo, Superyó"],
      ["Definición", "Modelo topográfico: divide la mente por nivel de acceso a la conciencia.", "Modelo estructural: divide la mente por función psíquica."],
      ["Consciente", "Lo que la persona sabe en el momento.", "Corresponde al Yo (en parte)"],
      ["Preconsciente", "Contenidos accesibles con esfuerzo atencional.", "También parte del Yo y Superyó"],
      ["Inconsciente", "Contenidos reprimidos, inaccesibles.", "Principalmente el Ello (pulsiones)"],
      ["Ejemplo", "Recordar un hecho traumático (preconsciente) vs. no poder recordarlo (inconsciente).", "Ello: impulso de agredir. Superyó: 'no está bien'. Yo: decide una respuesta socialmente aceptable."],
    ]
  }
];

function switchTab(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function buildFlashcards() {
  const grid = document.getElementById('fc-grid');
  flashcards.forEach((fc, i) => {
    const div = document.createElement('div');
    div.className = 'fc';
    div.innerHTML = `<div class="fc-q">${fc.q}</div><div class="fc-a">${fc.a}</div><span class="fc-hint">toca para ver</span>`;
    div.onclick = () => div.classList.toggle('open');
    grid.appendChild(div);
  });
}

function buildCitas() {
  const grid = document.getElementById('citas-grid');
  citas.forEach(fc => {
    const div = document.createElement('div');
    div.className = 'fc';
    div.innerHTML = `<div class="fc-q">${fc.q}</div><div class="fc-a" style="white-space:pre-line">${fc.a}</div><span class="fc-hint">toca para ver</span>`;
    div.onclick = () => div.classList.toggle('open');
    grid.appendChild(div);
  });
}

let vfAnswered = 0;
function buildVF() {
  const list = document.getElementById('vf-list');
  vfItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'vf-item';
    div.id = 'vf-' + i;
    div.innerHTML = `<p class="vf-stmt">${item.stmt}</p>
      <div class="vf-btns">
        <button class="vf-btn" onclick="checkVF(${i}, true, this)">Verdadero</button>
        <button class="vf-btn" onclick="checkVF(${i}, false, this)">Falso</button>
      </div>
      <div class="vf-feedback" id="fb-${i}"></div>`;
    list.appendChild(div);
  });
  updateVFScore();
}

function checkVF(i, chosen, btn) {
  const item = vfItems[i];
  const container = document.getElementById('vf-' + i);
  const fb = document.getElementById('fb-' + i);
  if (container.dataset.done) return;
  container.dataset.done = '1';
  vfAnswered++;
  const btns = container.querySelectorAll('.vf-btn');
  btns.forEach(b => b.onclick = null);
  if (chosen === item.answer) {
    btn.classList.add('correct');
    fb.className = 'vf-feedback show ok';
    fb.textContent = '✓ Correcto. ' + item.feedback;
  } else {
    btn.classList.add('wrong');
    const rightBtn = [...btns].find(b => b.textContent === (item.answer ? 'Verdadero' : 'Falso'));
    if (rightBtn) rightBtn.classList.add('correct');
    fb.className = 'vf-feedback show fail';
    fb.textContent = '✗ Incorrecto. ' + item.feedback;
  }
  updateVFScore();
}

function updateVFScore() {
  document.getElementById('vf-score').textContent = `Respondidas: ${vfAnswered} / ${vfItems.length}`;
  document.getElementById('vf-progress').style.width = (vfAnswered / vfItems.length * 100) + '%';
}

function resetVF() {
  vfAnswered = 0;
  document.getElementById('vf-list').innerHTML = '';
  buildVF();
}

function buildDesarrollo() {
  const list = document.getElementById('dev-list');
  desarrollo.forEach(item => {
    const div = document.createElement('div');
    div.className = 'dev-item';
    div.innerHTML = `<div class="dev-q">${item.q}</div>
      <div class="dev-guide">${item.guide}</div>
      <button class="dev-btn" onclick="sendPrompt('Explícame en detalle: ${item.q.replace(/'/g,"\\'")}')">Explicación detallada ↗</button>`;
    list.appendChild(div);
  });
}

function buildCuadros() {
  const cont = document.getElementById('cuadros-content');
  cuadros.forEach(c => {
    const h3 = document.createElement('h3');
    h3.style.cssText = 'font-size:15px; font-weight:500; color:var(--color-text-primary); margin-bottom:10px;';
    h3.textContent = c.title;
    cont.appendChild(h3);
    const wrap = document.createElement('div');
    wrap.className = 'table-wrap';
    let html = '<table><tr>' + c.headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
    c.rows.forEach(row => {
      html += '<tr>' + row.map(cell => `<td>${cell}</td>`).join('') + '</tr>';
    });
    html += '</table>';
    wrap.innerHTML = html;
    cont.appendChild(wrap);
    cont.appendChild(document.createElement('br'));
  });
}

buildFlashcards();
buildCitas();
buildVF();
buildDesarrollo();
buildCuadros();
</script>
